name = "cpp-sprint"
main = "functions/api/[[path]].js"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

[vars]
GH_REPO_OWNER = "Bowen-Wan"
GH_REPO_NAME = "30-Days-of-CPP"

[[kv_namespaces]]
binding = "PROGRESS_KV"
id = "<REPLACE_WITH_YOUR_KV_NAMESPACE_ID>"
preview_id = "<REPLACE_WITH_YOUR_PREVIEW_KV_ID>"

# Secrets (set via wrangler secret put):
# GH_OAUTH_CLIENT_ID
# GH_OAUTH_CLIENT_SECRET
# GH_ADMIN_TOKEN (GitHub Personal Access Token with repo scope)